<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONA Bar Checklist</title>
</head>
<body>
    <h1>ONA Bar Checklist</h1>
    <form>
        <label for="item1">Item 1:</label>
        <input type="checkbox" id="item1" name="item1"><br>
        <label for="item2">Item 2:</label>
        <input type="checkbox" id="item2" name="item2"><br>
        <label for="item3">Item 3:</label>
        <input type="checkbox" id="item3" name="item3"><br>
        <button type="submit">Submit</button>
    </form>
</body>
</html>
